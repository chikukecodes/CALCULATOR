<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="calc.css">
</head>
<body>
    <h1>CHIKULCULATOR</h1>
  <div class="calculator">
    <div class="display">
      <p>0</p>
    </div>
    <div class="buttons">
  <button class="clear" title="Clear all input">C</button>
  <button class="backspace" title="Delete last character">DEL</button>
  <button class="operator" title="Modulo (remainder)">%</button>
  <button class="operator" title="Power (exponentiation)">^</button>

  <button title="Seven">7</button>
  <button title="Eight">8</button>
  <button title="Nine">9</button>
  <button class="operator" title="Addition">+</button>

  <button title="Four">4</button>
  <button title="Five">5</button>
  <button title="Six">6</button>
  <button class="operator" title="Subtraction">-</button>

  <button title="One">1</button>
  <button title="Two">2</button>
  <button title="Three">3</button>
  <button class="operator" title="Multiplication">×</button>

  <button title="Zero">0</button>
  <button title="Decimal point">.</button>
  <button class="equal" title="Calculate result">=</button>
  <button class="operator" title="Division">÷</button>
</div>

  </div>
</body>
<script src="calc.js"></script>
</html>
